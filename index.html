<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f5f5">
<link rel="manifest" href="/sabtehazineha/manifest.json">
<link rel="apple-touch-icon" href="/sabtehazineha/icon-192.png">
<title>دفترچه هزینه</title>
<style>
@font-face{font-family:V;src:url(https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/fonts/webfonts/Vazirmatn[wght].woff2) format('woff2');font-weight:100 900;font-display:swap}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:V;background:#ececec;direction:rtl;display:flex;justify-content:center;min-height:100vh}
.app{width:412px;max-width:100vw;min-height:100vh;background:#f2f2f2;display:flex;flex-direction:column;overflow:hidden}

/* --- HEADER --- */
.hdr{background:#fff;flex-shrink:0;border:1px solid #e2e2e2;border-bottom:none;margin:12px 12px 0;padding:18px 16px 14px}
.hdr .total{text-align:center;color:#666;font-size:13px;font-weight:400}
.hdr .total b{font-size:24px;color:#1a5e3a;font-weight:900;display:block;margin-top:2px}
.hdr .info{text-align:center;font-size:10px;color:#bbb;margin-top:6px;min-height:16px}

/* --- FILTER BAR --- */
.fbar{display:none;align-items:center;gap:8px;padding:6px 16px;background:#fff;border:1px solid #e2e2e2;border-top:none;margin:0 12px;min-height:34px}
.fbar .cb-all{appearance:none;-webkit-appearance:none;width:17px;height:17px;border:1.5px solid #d0d0d0;background:#fff;cursor:pointer;margin:0}
.fbar .cb-all:checked{background:#1a5e3a;border-color:#1a5e3a}
.fbar .cnt{flex:1;font-size:11px;color:#aaa}
.fbar button{font-size:10px;padding:4px 10px;border:1px solid #e2e2e2;background:#fff;color:#999;cursor:pointer;font-family:V;white-space:nowrap;border-radius:0}
.fbar .del-sel.on{color:#d32f2f;border-color:#d32f2f}
.fbar .ib{width:26px;height:26px;border:1px solid #e2e2e2;background:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;color:#bbb;flex-shrink:0;border-radius:0}
.fbar .ib.ac{color:#1b4965;border-color:#1b4965;background:#f5f9fb}

/* --- LIST --- */
.list{flex:1;overflow-y:auto;padding:12px;background:#fff;margin:0 12px;border:1px solid #e2e2e2;border-top:none}
.day{margin-bottom:14px}
.day-hdr{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:#fafafa;border:1px solid #eee;font-size:12px;font-weight:600}
.day-hdr .d{color:#1a5e3a;font-weight:700}
.day-hdr .p{color:#aaa;font-size:11px;font-weight:500}
.day-body{background:#fff}
.item{display:flex;align-items:center;gap:6px;padding:11px 14px;border-bottom:1px solid #f4f4f4;cursor:pointer;transition:background .1s}
.item:last-child{border-bottom:none}
.item:active{background:#fafafa}
.item .cb{appearance:none;-webkit-appearance:none;width:17px;height:17px;border:1.5px solid #d8d8d8;background:#fff;cursor:pointer;display:none;margin:0;flex-shrink:0}
.item .cb.show{display:block}
.item .cb:checked{background:#1a5e3a;border-color:#1a5e3a}
.item .t{flex:1;font-size:14px;font-weight:600;color:#2a2a2a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item .pr{font-size:14px;font-weight:700;color:#1a5e3a;white-space:nowrap}
.item .pr .tm{font-size:9px;font-weight:400;color:#bbb;margin-right:2px;position:relative;top:2px}
.item .del{flex-shrink:0;width:28px;height:28px;border:none;background:transparent;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#d0d0d0;transition:color .15s}
.item .del:active{color:#d32f2f}
.item.hl{background:#fff5f5}
.item.new{animation:flash .6s ease}
@keyframes flash{0%{background:#edf7f0}100%{background:transparent}}
.empty{text-align:center;color:#c5c5c5;font-size:13px;padding:60px 0}
.empty span{font-size:42px;display:block;margin-bottom:10px;opacity:.5}

/* --- INPUT --- */
.inp{flex-shrink:0;background:#fff;border:1px solid #e2e2e2;border-top:none;margin:0 12px;padding:10px 12px 14px;display:flex;gap:8px;align-items:center;position:sticky;bottom:0}
.inp input{flex:1;min-width:0;padding:12px 10px;border:1px solid #e2e2e2;font-size:14px;font-family:V;background:#fafafa;outline:none;text-align:right;height:46px;color:#333}
.inp input::placeholder{color:#ccc}
.inp input:focus{border-color:#1a5e3a;background:#fff}
.inp button{width:46px;height:46px;border:none;background:#1a5e3a;color:#fff;font-size:26px;font-family:V;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;line-height:1}
.inp button:active{background:#144a2e}

/* --- OVERLAYS --- */
.ov{display:none;position:fixed;inset:0;z-index:100;align-items:center;justify-content:center}
.ov.show{display:flex}
.ov.bg{background:rgba(0,0,0,.3)}
.pop{background:#fff;border:1px solid #e2e2e2;padding:20px;width:330px;max-width:92vw;box-shadow:0 2px 20px rgba(0,0,0,.08)}
.pop h3{font-size:15px;text-align:center;color:#2a2a2a;margin-bottom:16px;font-weight:700}
.pop label{display:block;font-size:11px;color:#999;margin-bottom:4px;font-weight:600}
.pop input{width:100%;padding:11px 12px;border:1px solid #e2e2e2;font-size:14px;font-family:V;background:#fafafa;outline:none;text-align:right;margin-bottom:12px;color:#333}
.pop input:focus{border-color:#1a5e3a}
.pop .btns{display:flex;gap:8px;margin-top:8px}
.pop .btns button{flex:1;padding:11px;border:1px solid #e2e2e2;background:#fff;font-size:13px;font-family:V;cursor:pointer;color:#666}
.pop .btns .save{background:#1a5e3a;color:#fff;border-color:#1a5e3a}
.pop .rf{display:flex;gap:6px;align-items:center;margin-bottom:8px}
.pop .rf input{flex:1;padding:8px;font-size:12px;text-align:center;margin-bottom:0}
.pop .rf span{color:#bbb;font-size:10px}
.pop .sr{display:flex;gap:4px;margin-bottom:8px}
.pop .sr button{flex:1;padding:7px;border:1px solid #e2e2e2;background:#fff;font-size:10px;font-family:V;cursor:pointer;color:#999;white-space:nowrap}
.pop .sr button.on{border-color:#1a5e3a;color:#1a5e3a;background:#f4faf6}
.pop .qd{display:flex;gap:4px;margin-bottom:8px}
.pop .qd button{flex:1;padding:6px;border:1px solid #e2e2e2;background:#fff;font-size:10px;font-family:V;cursor:pointer;color:#999}
.pop .bl{display:flex;flex-direction:column;gap:6px}
.pop .bl button{padding:12px;border:1px solid #e2e2e2;background:#fff;font-size:12px;font-family:V;cursor:pointer;text-align:right;color:#555}
.pop .bl button:active{background:#fafafa}

/* --- CALENDAR --- */
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:6px}
.ch button{width:34px;height:34px;border:1px solid #e2e2e2;background:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:V;color:#888}
.ch .my{font-size:15px;font-weight:800;color:#2a2a2a;text-align:center;flex:1}
.cdh{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:11px;color:#bbb;margin-bottom:6px;font-weight:600}
.cd{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.cd button{width:100%;aspect-ratio:1;border:none;background:transparent;font-size:13px;cursor:pointer;font-family:V;color:#666}
.cd button:hover{background:#e8f5e9}
.cd button.sl{background:#1a5e3a;color:#fff}
.cd button.ep{cursor:default;color:transparent}
.cd button.td{font-weight:800;border:2px solid #1a5e3a}
.pop .ccls{display:block;width:100%;margin-top:12px;padding:9px;border:1px solid #e2e2e2;background:#fafafa;font-size:12px;font-family:V;cursor:pointer;text-align:center;color:#999}

/* --- CONFIRM --- */
.cfbox{background:#fff;border:1px solid #e2e2e2;padding:26px;width:290px;max-width:90vw;text-align:center;box-shadow:0 2px 20px rgba(0,0,0,.08)}
.cfbox p{font-size:14px;color:#333;margin-bottom:16px}
.cfbox .cbtns{display:flex;gap:8px}
.cfbox .cbtns button{flex:1;padding:11px;border:1px solid #e2e2e2;background:#fff;font-size:13px;font-family:V;cursor:pointer;color:#666}
.cfbox .cbtns .cok{background:#d32f2f;color:#fff;border-color:#d32f2f}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:9px 22px;font-size:12px;font-family:V;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;border-radius:0}
.toast.on{opacity:1}
</style>
</head>

<div class="ov bg" id="bp"><div class="pop">

  <div class="btns" style="margin-top:10px"><button id="bcl" style="color:#999">بستن</button></div>
</div></div>

<div class="ov bg" id="cv"><div class="pop" id="cc"></div></div>
<div class="ov bg" id="cf"><div class="cfbox"><p id="cm"></p><div class="cbtns"><button id="cn">خیر</button><button class="cok" id="cy">بله</button></div></div></div>
