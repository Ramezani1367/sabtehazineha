<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,interactive-widget=resizes-content">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f5f5">
<link rel="manifest" href="/sabtehazineha/manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="/sabtehazineha/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/sabtehazineha/favicon-32.png">
<link rel="icon" type="image/png" sizes="48x48" href="/sabtehazineha/favicon-48.png">
<link rel="icon" type="image/x-icon" href="/sabtehazineha/favicon.ico">
<title>دفترچه هزینه</title>
<style>
@font-face {
  font-family: V;
  src: url(https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/fonts/webfonts/Vazirmatn[wght].woff2) format('woff2');
  font-weight: 100 900;
  font-display: swap
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box
}

body {
  font-family: V;
  background: #ececec;
  direction: rtl;
  display: flex;
  justify-content: center;
  min-height: 100vh
}

.app {
  width: 412px;
  max-width: 100vw;
  min-height: 100vh;
  background: #f2f2f2;
  display: flex;
  flex-direction: column
}

/* --- HEADER --- */
.hdr {
  background: #fff;
  flex-shrink: 0;
  padding: 18px 16px 14px
}

.hdr .total {
  text-align: center;
  color: #777;
  font-size: 12px;
  font-weight: 400
}

.hdr .total b {
  font-size: 26px;
  color: #1a5e3a;
  font-weight: 900;
  display: block;
  margin-top: 2px
}

.hdr .total .hdr-tm {
  font-size: 11px;
  font-weight: 400;
  color: #aaa;
  display: inline-block;
  position: relative;
  top: 3px;
  margin-right: 3px
}

.hdr .info {
  text-align: center;
  font-size: 10px;
  color: #bbb;
  margin-top: 6px;
  min-height: 16px
}

/* --- FILTER BAR / MULTI SELECT --- */
.fbar {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 6px 16px;
  background: #fff;
  border-top: 1px solid #e2e2e2;
  border-bottom: 1px solid #e2e2e2;
  min-height: 40px
}

.fbar button {
  font-size: 10px;
  padding: 4px 10px;
  border: 1px solid #e2e2e2;
  background: #fff;
  color: #999;
  cursor: pointer;
  font-family: V;
  white-space: nowrap;
  border-radius: 0
}

.fbar .select-toggle {
  margin-left: auto;
  color: #1a5e3a;
  border-color: #1a5e3a;
  min-width: 70px
}

.fbar .select-toggle.on {
  background: #1a5e3a;
  color: #fff;
  border-color: #1a5e3a
}

.fbar .select-controls {
  display: none;
  align-items: center;
  gap: 7px;
  flex: 1;
  min-width: 0
}

.fbar .select-controls.on {
  display: flex
}

.fbar .select-all {
  appearance: none;
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border: 1.5px solid #c8c8c8;
  background: #fff;
  cursor: pointer;
  margin: 0;
  flex-shrink: 0;
  padding: 0
}

.fbar .select-all:checked {
  background: #1a5e3a;
  border-color: #1a5e3a;
  box-shadow: inset 0 0 0 3px #fff
}

.fbar .select-all:indeterminate {
  background: linear-gradient(#1a5e3a, #1a5e3a) center/9px 2px no-repeat #fff;
  border-color: #1a5e3a
}

.fbar .cnt {
  flex: 1;
  min-width: 0;
  font-size: 11px;
  color: #777;
  white-space: nowrap
}

.fbar .del-sel {
  color: #bbb;
  pointer-events: none
}

.fbar .del-sel.on {
  color: #d32f2f;
  border-color: #d32f2f;
  pointer-events: auto
}

.fbar .ib {
  width: 26px;
  height: 26px;
  border: 1px solid #e2e2e2;
  background: #fff;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  color: #bbb;
  flex-shrink: 0;
  border-radius: 0
}

.fbar .ib.ac {
  color: #1b4965;
  border-color: #1b4965;
  background: #f5f9fb
}

.fbar.selecting .filter-action {
  display: none !important
}

/* --- LIST --- */
.list {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
  background: #fff;
  margin: 0 12px;
  border: 1px solid #e2e2e2;
  border-top: none
}

.day {
  margin-bottom: 14px
}

.day-hdr {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 14px;
  background: #fafafa;
  border: 1px solid #eee;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  touch-action: manipulation
}

.day-hdr .d {
  color: #1a5e3a;
  font-weight: 700
}

.day-hdr .p {
  color: #aaa;
  font-size: 11px;
  font-weight: 500
}

/* --- SELECTION SHARE --- */
.fbar .sh-sel,
.fbar .mv-sel {
  color: #bbb;
  pointer-events: none
}

.fbar .sh-sel.on,
.fbar .mv-sel.on {
  color: #1a5e3a;
  border-color: #1a5e3a;
  pointer-events: auto
}

.pop .shp {
  white-space: pre-wrap;
  word-break: break-word;
  font-family: V;
  font-size: 13px;
  line-height: 1.9;
  color: #333;
  direction: rtl;
  text-align: right;
  background: #fafafa;
  border: 1px solid #e2e2e2;
  padding: 10px 12px;
  max-height: 260px;
  overflow-y: auto;
  margin: 0 0 12px
}

.day-body {
  background: #fff
}

.item {
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid #f4f4f4;
  cursor: pointer;
  transition: background .1s
}

.item:last-child {
  border-bottom: none
}

.item:active .swfg {
  background: #fafafa
}

.swfg {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 11px 14px;
  background: #fff;
  transition: transform .18s ease;
  touch-action: pan-y
}

.swbg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  padding: 0 16px;
  opacity: 0;
  pointer-events: none;
  direction: ltr;
  transition: opacity .12s
}

.swbg.e {
  background: #1a5e3a;
  justify-content: flex-start
}

.swbg.d {
  background: #d32f2f;
  justify-content: flex-end
}

.item .cb {
  appearance: none;
  -webkit-appearance: none;
  width: 17px;
  height: 17px;
  border: 1.5px solid #d8d8d8;
  background: #fff;
  cursor: pointer;
  display: none;
  margin: 0;
  flex-shrink: 0
}

.item .cb.show {
  display: block
}

.item .cb:checked {
  background: #1a5e3a;
  border-color: #1a5e3a
}

.item .t {
  flex: 1;
  font-size: 14px;
  font-weight: 600;
  color: #2a2a2a;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap
}

.item .pr {
  font-size: 14px;
  font-weight: 700;
  color: #1a5e3a;
  white-space: nowrap
}

.item .pr .tm {
  font-size: 9px;
  font-weight: 400;
  color: #bbb;
  margin-right: 2px;
  position: relative;
  top: 2px
}

.item .del {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border: none;
  background: transparent;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #d0d0d0;
  transition: color .15s
}

.item .del:active {
  color: #d32f2f
}

.item.hl {
  background: #fff5f5
}

.item.new {
  animation: flash .6s ease
}

@keyframes flash {
  0% {
    background: #edf7f0
  }

  100% {
    background: transparent
  }
}

.empty {
  text-align: center;
  color: #c5c5c5;
  font-size: 13px;
  padding: 60px 0
}

.empty span {
  font-size: 42px;
  display: block;
  margin-bottom: 10px;
  opacity: .5
}

/* --- INPUT --- */
.inp {
  flex-shrink: 0;
  background: #fff;
  border: 1px solid #e2e2e2;
  border-top: none;
  margin: 0 12px;
  padding: 10px 16px 14px;
  display: flex;
  gap: 8px;
  align-items: center
}

.inp input {
  flex: 1;
  min-width: 0;
  padding: 12px 10px;
  border: 1px solid #e2e2e2;
  font-size: 14px;
  font-family: V;
  background: #fafafa;
  outline: none;
  text-align: right;
  height: 46px;
  color: #333
}

.inp input::placeholder {
  color: #ccc
}

.inp input:focus {
  border-color: #1a5e3a;
  background: #fff
}

.inp button {
  width: 46px;
  height: 46px;
  border: none;
  background: #1a5e3a;
  color: #fff;
  font-size: 26px;
  font-family: V;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1
}

.inp button:active {
  background: #144a2e
}

/* --- OVERLAYS --- */
.ov {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  align-items: center;
  justify-content: center
}

.ov.show {
  display: flex
}

.ov.bg {
  background: rgba(0, 0, 0, .3)
}

.pop {
  background: #fff;
  border: 1px solid #e2e2e2;
  padding: 20px;
  width: 330px;
  max-width: 92vw;
  box-shadow: 0 2px 20px rgba(0, 0, 0, .08)
}

.pop h3 {
  font-size: 15px;
  text-align: center;
  color: #2a2a2a;
  margin-bottom: 16px;
  font-weight: 700
}

.pop label {
  display: block;
  font-size: 11px;
  color: #999;
  margin-bottom: 4px;
  font-weight: 600
}

.pop input {
  width: 100%;
  padding: 11px 12px;
  border: 1px solid #e2e2e2;
  font-size: 14px;
  font-family: V;
  background: #fafafa;
  outline: none;
  text-align: right;
  margin-bottom: 12px;
  color: #333
}

.pop input:focus {
  border-color: #1a5e3a
}

.pop .btns {
  display: flex;
  gap: 8px;
  margin-top: 8px
}

.pop .btns button {
  flex: 1;
  padding: 11px;
  border: 1px solid #e2e2e2;
  background: #fff;
  font-size: 13px;
  font-family: V;
  cursor: pointer;
  color: #666
}

.pop .btns .save {
  background: #1a5e3a;
  color: #fff;
  border-color: #1a5e3a
}

.pop .rf {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-bottom: 8px
}

.pop .rf input {
  flex: 1;
  padding: 8px;
  font-size: 12px;
  text-align: center;
  margin-bottom: 0
}

.pop .rf span {
  color: #bbb;
  font-size: 10px
}

.pop .sr {
  display: flex;
  gap: 4px;
  margin-bottom: 8px
}

.pop .sr button {
  flex: 1;
  padding: 7px;
  border: 1px solid #e2e2e2;
  background: #fff;
  font-size: 10px;
  font-family: V;
  cursor: pointer;
  color: #999;
  white-space: nowrap
}

.pop .sr button.on {
  border-color: #1a5e3a;
  color: #1a5e3a;
  background: #f4faf6
}

.pop .qd {
  display: flex;
  gap: 4px;
  margin-bottom: 8px
}

.pop .qd button {
  flex: 1;
  padding: 6px;
  border: 1px solid #e2e2e2;
  background: #fff;
  font-size: 10px;
  font-family: V;
  cursor: pointer;
  color: #999
}

.pop .bl {
  display: flex;
  flex-direction: column;
  gap: 6px
}

.pop .bl button {
  padding: 12px;
  border: 1px solid #e2e2e2;
  background: #fff;
  font-size: 12px;
  font-family: V;
  cursor: pointer;
  text-align: right;
  color: #555
}

.pop .bl button:active {
  background: #fafafa
}

/* --- CALENDAR --- */
.ch {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  gap: 6px
}

.ch button {
  width: 34px;
  height: 34px;
  border: 1px solid #e2e2e2;
  background: #fff;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: V;
  color: #888
}

.ch .my {
  font-size: 15px;
  font-weight: 800;
  color: #2a2a2a;
  text-align: center;
  flex: 1
}

.cdh {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  font-size: 11px;
  color: #bbb;
  margin-bottom: 6px;
  font-weight: 600
}

.cd {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  text-align: center
}

.cd button {
  width: 100%;
  aspect-ratio: 1;
  border: none;
  background: transparent;
  font-size: 13px;
  cursor: pointer;
  font-family: V;
  color: #666
}

.cd button:hover {
  background: #e8f5e9
}

.cd button.sl {
  background: #1a5e3a;
  color: #fff
}

.cd button.ep {
  cursor: default;
  color: transparent
}

.cd button.td {
  font-weight: 800;
  border: 2px solid #1a5e3a
}

.pop .ccls {
  display: block;
  width: 100%;
  margin-top: 12px;
  padding: 9px;
  border: 1px solid #e2e2e2;
  background: #fafafa;
  font-size: 12px;
  font-family: V;
  cursor: pointer;
  text-align: center;
  color: #999
}

/* --- CONFIRM --- */
.cfbox {
  background: #fff;
  border: 1px solid #e2e2e2;
  padding: 26px;
  width: 290px;
  max-width: 90vw;
  text-align: center;
  box-shadow: 0 2px 20px rgba(0, 0, 0, .08)
}

.cfbox p {
  font-size: 14px;
  color: #333;
  margin-bottom: 16px
}

.cfbox .cbtns {
  display: flex;
  gap: 8px
}

.cfbox .cbtns button {
  flex: 1;
  padding: 11px;
  border: 1px solid #e2e2e2;
  background: #fff;
  font-size: 13px;
  font-family: V;
  cursor: pointer;
  color: #666
}

.cfbox .cbtns .cok {
  background: #d32f2f;
  color: #fff;
  border-color: #d32f2f
}

.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: #fff;
  padding: 9px 22px;
  font-size: 12px;
  font-family: V;
  z-index: 9999;
  opacity: 0;
  transition: opacity .3s;
  pointer-events: none;
  border-radius: 0
}

.toast.on {
  opacity: 1
}
</style>
</head>
<body>

<div class="app">

  <div style="margin:12px 12px 0;flex-shrink:0;border-left:1px solid #e2e2e2;border-right:1px solid #e2e2e2">
  <div class="hdr">
    <div class="total">مجموع هزینه‌ها<b id="t">۰</b></div>
    <div class="info" id="fi"></div>
  </div>

  <div class="fbar" id="fb">
    <button class="select-toggle" id="sm" type="button" aria-pressed="false">انتخاب</button>
    <div class="select-controls" id="sctrl">
      <input type="checkbox" class="select-all" id="sa" title="انتخاب همه موارد" aria-label="انتخاب همه موارد نمایشی">
      <span class="cnt" id="sc">۰ انتخاب</span>
      <button class="sh-sel" id="sbs" type="button">➦ اشتراک</button>
      <button class="mv-sel" id="smv" type="button">➔ انتقال</button>
      <button class="del-sel" id="ds" type="button" aria-label="حذف موارد انتخابی">🗑</button>
    </div>
    <button class="filter-action" id="qr" type="button" style="display:none;background:#1b4965;color:#fff;border-color:#1b4965">↺ حذف فیلترها</button>
    <button class="ib filter-action" id="fbtn" type="button" aria-label="فیلترها">⚙</button>
    <button class="ib filter-action" id="sbtn" type="button" aria-label="پشتیبان‌گیری و بازیابی">☁</button>
  </div>
</div>

  <div class="list" id="ls" aria-live="polite"><div class="empty"><span>📒</span>هنوز هزینه‌ای ثبت نشده</div></div>

  <div class="inp">
    <input type="text" id="ti" aria-label="عنوان خرید" placeholder="عنوان خرید" autocomplete="off">
    <input type="text" id="pi" aria-label="مبلغ به تومان" placeholder="مبلغ (تومان)" inputmode="numeric" autocomplete="off">
    <button id="ab" type="button" aria-label="افزودن هزینه">+</button>
  </div>

</div>

<div class="ov" id="em"><div class="pop" role="dialog" aria-modal="true" aria-labelledby="edit-title">
  <h3 id="edit-title">✏️ ویرایش</h3>
  <label for="et">عنوان</label><input type="text" id="et">
  <label for="ep">قیمت (تومان)</label><input type="text" id="ep" inputmode="numeric">
  <label for="ed">تاریخ</label><input type="text" id="ed" readonly placeholder="انتخاب تاریخ" style="cursor:pointer">
  <div class="btns"><button id="ec">انصراف</button><button class="save" id="es">ذخیره</button></div>
</div></div>

<div class="ov" id="dmm"><div class="pop" role="dialog" aria-modal="true" aria-labelledby="dmt">
  <h3 id="dmt">📅 تغییر تاریخ</h3>
  <label for="dml">تاریخ فعلی</label><input type="text" id="dml" readonly style="background:#f0f0f0;color:#888">
  <label for="dmd">تاریخ جدید</label><input type="text" id="dmd" readonly placeholder="انتخاب تاریخ" style="cursor:pointer">
  <div class="btns"><button id="dmx">انصراف</button><button class="save" id="dms">انتقال</button></div>
</div></div>

<div class="ov bg" id="fp"><div class="pop" role="dialog" aria-modal="true" aria-labelledby="filter-title">
  <h3 id="filter-title">⚙ فیلترها</h3>
  <label>بازه تاریخ</label>
  <div class="rf"><span>از</span><input type="text" id="fd1" readonly placeholder="--"><span>تا</span><input type="text" id="fd2" readonly placeholder="--"><button id="fdr" type="button" aria-label="پاک کردن بازه تاریخ" style="width:30px;height:30px;border:1px solid #e2e2e2;background:#fff;cursor:pointer;font-size:14px;padding:0;flex-shrink:0;color:#aaa">↺</button></div>
  <div class="qd"><button data-q="today">امروز</button><button data-q="week">این هفته</button><button data-q="month">این ماه</button></div>
  <label>جستجو</label><input type="text" id="fse" placeholder="جستجوی عنوان...">
  <label>مرتب‌سازی</label>
  <div class="sr"><button data-s="date-desc">جدیدترین</button><button data-s="date-asc" class="on">قدیمی‌ترین</button><button data-s="price-desc">گران‌ترین</button><button data-s="price-asc">ارزان‌ترین</button></div>
  <div class="btns"><button id="fra" style="color:#999">↺ پاک کردن</button><button class="save" id="fap">اعمال</button></div>
</div></div>

<div class="ov bg" id="bp"><div class="pop" role="dialog" aria-modal="true" aria-labelledby="backup-title">
  <h3 id="backup-title">☁ بکاپ</h3>
  <div class="bl"><button id="be1">📄 خروجی JSON</button><button id="be2">📊 خروجی Excel</button><button id="bi1">📥 وارد کردن JSON</button><button id="bi2">📥 وارد کردن Excel</button></div>
  <div class="btns" style="margin-top:10px"><button id="bcl" style="color:#999">بستن</button></div>
</div></div>

<div class="ov" id="shm"><div class="pop" role="dialog" aria-modal="true" aria-labelledby="shh">
  <h3 id="shh">📤 اشتراک‌گذاری موارد</h3>
  <pre class="shp" id="shp"></pre>
  <div class="btns"><button class="save" id="shs">📤 اشتراک</button><button id="shc">📋 کپی</button><button id="shx" style="color:#999">بستن</button></div>
</div></div>

<div class="ov bg" id="cv"><div class="pop" id="cc" role="dialog" aria-modal="true" aria-label="انتخاب تاریخ"></div></div>

<script>
(function() {
  // Number and price formatting
  var PERSIAN_DIGITS = ['۰', '۱', '۲', '۳', '۴', '۵', '۶', '۷', '۸', '۹'];

  function toPersianDigits(n) {
    return String(n).replace(/\d/g, function(d) {
      return PERSIAN_DIGITS[+d]
    })
  }

  function formatNumber(n) {
    return n ? toPersianDigits(n.toLocaleString('en-US')) : '۰'
  }

  function formatPriceHtml(n) {
    return n ? toPersianDigits(n.toLocaleString('en-US')) + '<span class="tm">تومان</span>' :
      '۰<span class="tm">تومان</span>'
  }

  function formatPriceInput(v) {
    var e = v.replace(/[۰-۹]/g, function(d) {
      return String('۰۱۲۳۴۵۶۷۸۹'.indexOf(d))
    });
    e = e.replace(/[٬,\s]/g, '');
    if (!e) return '';
    var n = parseInt(e);
    if (isNaN(n) || n <= 0) return v;
    return toPersianDigits(n.toLocaleString('en-US'))
  }

  function parsePrice(s) {
    var e = s.replace(/[۰-۹]/g, function(d) {
      return String('۰۱۲۳۴۵۶۷۸۹'.indexOf(d))
    });
    return parseInt(e.replace(/[٬,\s]/g, '')) || 0
  }

  // Jalali date conversion and presentation
  function gregorianToJalali(y, m, d) {
    var g = [0, 31, 59, 90, 120, 151, 181, 212, 243, 273, 304, 334];
    var y2 = (m > 2) ? y + 1 : y;
    var deleteSelectedButton = 355666 + 365 * y + Math.floor((y2 + 3) / 4) - Math.floor((y2 + 99) / 100) +
      Math.floor((y2 + 399) / 400) + d + g[m - 1];
    var jy = -1595 + 33 * Math.floor(deleteSelectedButton / 12053);
    deleteSelectedButton %= 12053;
    jy += 4 * Math.floor(deleteSelectedButton / 1461);
    deleteSelectedButton %= 1461;
    if (deleteSelectedButton > 365) {
      jy += Math.floor((deleteSelectedButton - 1) / 365);
      deleteSelectedButton = (deleteSelectedButton - 1) % 365
    }
    var jm, jd;
    if (deleteSelectedButton < 186) {
      jm = 1 + Math.floor(deleteSelectedButton / 31);
      jd = 1 + deleteSelectedButton % 31
    } else {
      jm = 7 + Math.floor((deleteSelectedButton - 186) / 30);
      jd = 1 + (deleteSelectedButton - 186) % 30
    }
    return {
      y: jy,
      m: jm,
      d: jd
    }
  }

  function jalaliToGregorian(y, m, d) {
    y += 1595;
    var deleteSelectedButton = -355668 + 365 * y + Math.floor(y / 33) * 8 + Math.floor(((y % 33) + 3) / 4) +
      d;
    if (m < 7) deleteSelectedButton += (m - 1) * 31;
    else deleteSelectedButton += (m - 7) * 30 + 186;
    var gy = 400 * Math.floor(deleteSelectedButton / 146097);
    deleteSelectedButton %= 146097;
    if (deleteSelectedButton > 36524) {
      gy += 100 * Math.floor(--deleteSelectedButton / 36524);
      deleteSelectedButton %= 36524;
      if (deleteSelectedButton >= 365) deleteSelectedButton++
    }
    gy += 4 * Math.floor(deleteSelectedButton / 1461);
    deleteSelectedButton %= 1461;
    if (deleteSelectedButton > 365) {
      gy += Math.floor((deleteSelectedButton - 1) / 365);
      deleteSelectedButton = (deleteSelectedButton - 1) % 365
    }
    var gd = deleteSelectedButton + 1;
    var selectAllCheckbox = [0, 31, ((gy % 4 === 0 && gy % 100 !== 0) || (gy % 400 === 0)) ? 29 : 28, 31,
      30, 31, 30, 31, 31, 30, 31, 30, 31
    ];
    var gm = 0;
    while (gm < 13 && gd > selectAllCheckbox[gm]) {
      gd -= selectAllCheckbox[gm];
      gm++
    }
    return {
      y: gy,
      m: gm,
      d: gd
    }
  }
  var JALALI_MONTHS = ['فروردین', 'اردیبهشت', 'خرداد', 'تیر', 'مرداد', 'شهریور', 'مهر', 'آبان', 'آذر', 'دی',
    'بهمن', 'اسفند'
  ];
  var WEEKDAY_SHORT = ['ش', 'ی', 'د', 'س', 'چ', 'پ', 'ج'];
  var WEEKDAY_FULL = ['شنبه', 'یکشنبه', 'دوشنبه', 'سه‌شنبه', 'چهارشنبه', 'پنجشنبه', 'جمعه'];

  function formatDateWithWeekday(k) {
    var p = k.split('-');
    var g = jalaliToGregorian(parseInt(p[0]), parseInt(p[1]), parseInt(p[2]));
    var dw = new Date(g.y, g.m - 1, g.d).getDay();
    dw = (dw + 1) % 7;
    return WEEKDAY_SHORT[dw] + ' | ' + toPersianDigits(parseInt(p[2])) + ' ' + JALALI_MONTHS[parseInt(p[
      1]) - 1] + ' ' + toPersianDigits(parseInt(p[0]))
  }

  function formatDateHeader(k) {
    var p = k.split('-');
    var g = jalaliToGregorian(parseInt(p[0]), parseInt(p[1]), parseInt(p[2]));
    var dw = new Date(g.y, g.m - 1, g.d).getDay();
    dw = (dw + 1) % 7;
    return '<span style="color:#b0b0b0;font-weight:400">' + WEEKDAY_SHORT[dw] +
      '</span> <span style="color:#d0d0d0">|</span> ' + toPersianDigits(parseInt(p[2])) + ' ' +
      JALALI_MONTHS[parseInt(p[1]) - 1] + ' ' + toPersianDigits(parseInt(p[0]))
  }

  function todayDateKey() {
    var n = new Date();
    var j = gregorianToJalali(n.getFullYear(), n.getMonth() + 1, n.getDate());
    return j.y + '-' + j.m + '-' + j.d
  }

  function firstOfMonth() {
    var n = new Date();
    var j = gregorianToJalali(n.getFullYear(), n.getMonth() + 1, n.getDate());
    return j.y + '-' + j.m + '-1'
  }

  function monthLabel() {
    var n = new Date();
    var j = gregorianToJalali(n.getFullYear(), n.getMonth() + 1, n.getDate());
    return JALALI_MONTHS[j.m - 1]
  }

  function formatDate(k) {
    var p = k.split('-');
    return toPersianDigits(parseInt(p[2])) + ' ' + JALALI_MONTHS[parseInt(p[1]) - 1] + ' ' +
      toPersianDigits(parseInt(p[0]))
  }

  function parseDisplayedDate(t) {
    var s = t.replace(/[۰-۹]/g, function(d) {
      return String('۰۱۲۳۴۵۶۷۸۹'.indexOf(d))
    });
    for (var mi = 0; mi < JALALI_MONTHS.length; mi++) {
      if (s.indexOf(JALALI_MONTHS[mi]) !== -1) {
        var bf = s.substring(0, s.indexOf(JALALI_MONTHS[mi])),
          af = s.substring(s.indexOf(JALALI_MONTHS[mi]) + JALALI_MONTHS[mi].length);
        var dm = bf.match(/(\d+)/),
          ym = af.match(/(\d+)/);
        if (dm && ym) {
          var dd = parseInt(dm[1]),
            yy = parseInt(ym[1]);
          if (yy < 100) yy += 1400;
          if (dd >= 1 && dd <= 31 && yy >= 1300 && yy <= 1500) return yy + '-' + (mi + 1) + '-' + dd
        }
      }
    }
    return null
  }

  // Persistent expense data
  var SAMPLE_EXPENSES = [{
    t: 'نان',
    p: 5000,
    d: '1405-4-20',
    idx: 0
  }, {
    t: 'شیر',
    p: 12000,
    d: '1405-4-20',
    idx: 1
  }, {
    t: 'تاکسی',
    p: 35000,
    d: '1405-4-20',
    idx: 2
  }, {
    t: 'پیتزا',
    p: 85000,
    d: '1405-4-21',
    idx: 3
  }, {
    t: 'میوه',
    p: 28000,
    d: '1405-4-21',
    idx: 4
  }, {
    t: 'نان۲',
    p: 4000,

    idx: 5
  }, {

  }, {

    idx: 7
  }, {
    t: 'لبنیات',
    p: 45000,
    d: '1405-4-22',
    idx: 8
  }];
  var expenses = [],
    nextExpenseId = 10,
    STORAGE_KEY = 'xp_v26';

  // Cached DOM references
  var listElement = document.getElementById('ls'),
    totalElement = document.getElementById('t'),
    filterInfoElement = document.getElementById('fi'),
    titleInput = document.getElementById('ti'),
    priceInput = document.getElementById('pi'),
    addButton = document.getElementById('ab');
  var editModal = document.getElementById('em'),
    editTitleInput = document.getElementById('et'),
    editPriceInput = document.getElementById('ep'),
    editDateInput = document.getElementById('ed'),
    editCancelButton = document.getElementById('ec'),
    editSaveButton = document.getElementById('es');
  var filterBar = document.getElementById('fb'),
    selectionToggleButton = document.getElementById('sm'),
    selectionControls = document.getElementById('sctrl'),
    selectAllCheckbox = document.getElementById('sa'),
    selectedCountElement = document.getElementById('sc'),
    deleteSelectedButton = document.getElementById('ds'),
    clearFiltersButton = document.getElementById('qr'),

  var filterModal = document.getElementById('fp'),
    filterFromInput = document.getElementById('fd1'),

    clearDateFilterButton = document.getElementById('fdr'),

  var backupModal = document.getElementById('bp'),

  var confirmModal = document.getElementById('cf'),

    shareNativeButton = document.getElementById('shs'),
    shareCopyButton = document.getElementById('shc'),
    shareCloseButton = document.getElementById('shx');
  var shareTextCache = '';

  // UI state
  var filterFrom = '',
    filterTo = '',
    searchText = '',
    sortMode = 'date-asc',
    selectedIds = {},
    selectionMode = false,
    confirmCancelCallback = null,
    pendingConfirmCallback = null,
    editingDataIndex = -1,
    calendarYear, calendarMonth, calendarDay;

  function showToast(m) {
    to.textContent = m;
    to.classList.add('on');
    clearTimeout(to._t);
    to._t = setTimeout(function() {
      to.classList.remove('on')
    }, 1800)
  }

  // Storage, filtering, and rendering
  function loadExpenses() {
    var r = null;
    try {
      r = localStorage.getItem(STORAGE_KEY);
      if (r === null) {
        expenses = SAMPLE_EXPENSES.slice();
        nextExpenseId = 10;
        saveExpenses()
      } else {
        expenses = JSON.parse(r);
        if (!Array.isArray(expenses)) expenses = []
      }
    } catch (e) {
      expenses = []
    }
    var savedNextId = 0;
    try {
      savedNextId = parseInt(localStorage.getItem(STORAGE_KEY + '_ni')) || 0
    } catch (e) {}
    if (savedNextId > nextExpenseId) nextExpenseId = savedNextId;
    for (var i = 0; i < expenses.length; i++) {
      if (expenses[i].idx >= nextExpenseId) nextExpenseId = expenses[i].idx + 1
    }
  }

  function saveExpenses() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses));
      localStorage.setItem(STORAGE_KEY + '_ni', nextExpenseId)
    } catch (e) {}
  }

  function isInDateRange(k) {
    var value = dateKeyNumber(k);
    if (!filterFrom && !filterTo) return value >= dateKeyNumber(firstOfMonth());
    if (filterFrom && value < dateKeyNumber(filterFrom)) return false;
    if (filterTo && value > dateKeyNumber(filterTo)) return false;
    return true
  }

  function matchesSearch(t) {
    if (!searchText) return true;
    return t.indexOf(searchText) !== -1
  }

  function dateKeyNumber(k) {
    var p = String(k || '0-0-0').split('-');
    return (parseInt(p[0]) || 0) * 10000 + (parseInt(p[1]) || 0) * 100 + (parseInt(p[2]) || 0)
  }

  function getFilteredExpenses() {
    var a = [];
    for (var i = 0; i < expenses.length; i++) {
      var d = expenses[i];
      if (isInDateRange(d.d) && matchesSearch(d.t)) a.push(d)
    }
    if (sortMode === 'date-asc') a.sort(function(a, b) {
      return dateKeyNumber(a.d) - dateKeyNumber(b.d) || a.idx - b.idx
    });
    else if (sortMode === 'price-desc') a.sort(function(a, b) {
      return b.p - a.p || a.idx - b.idx
    });
    else if (sortMode === 'price-asc') a.sort(function(a, b) {
      return a.p - b.p || a.idx - b.idx
    });
    else a.sort(function(a, b) {
      return dateKeyNumber(b.d) - dateKeyNumber(a.d) || a.idx - b.idx
    });
    return a
  }

  function updateFilterUI() {
    var hf = !!(filterFrom || filterTo || searchText || sortMode !== 'date-asc');
    filterButton.classList.toggle('ac', hf);
    clearFiltersButton.style.display = hf ? 'inline-block' : 'none';
    var p = [];
    if (filterFrom) p.push('از ' + formatDate(filterFrom));
    if (filterTo) p.push('تا ' + formatDate(filterTo));
    if (searchText) p.push('"' + searchText + '"');
    filterInfoElement.textContent = p.length ? p.join(' | ') : '';
    var hr = !!(filterFrom || filterTo);
    clearDateFilterButton.style.color = hr ? '#1a5e3a' : '#aaa';
    clearDateFilterButton.style.borderColor = hr ? '#1a5e3a' : '#e2e2e2';
    var sb_ = filterModal.querySelectorAll('.sr button');
    for (var i = 0; i < sb_.length; i++) sb_[i].classList.toggle('on', sb_[i].getAttribute('data-s') ===
      sortMode)
  }

  function ensureItemIds() {
    var seen = {},
      changed = false;
    for (var i = 0; i < expenses.length; i++) {
      var id = Number(expenses[i].idx);
      if (!Number.isInteger(id) || seen[id]) {
        while (seen[nextExpenseId]) nextExpenseId++;
        expenses[i].idx = nextExpenseId++;
        id = expenses[i].idx;
        changed = true
      }
      seen[id] = true;
      if (id >= nextExpenseId) nextExpenseId = id + 1
    }
    if (changed) saveExpenses()
  }

  function renderExpenses() {
    ensureItemIds();
    var fl = getFilteredExpenses();
    var s = 0;
    for (var i = 0; i < fl.length; i++) s += fl[i].p;
    totalElement.innerHTML = formatPriceHtml(s);
    // Update header label
    var ht = document.querySelector('.total');
    if (!filterFrom && !filterTo) {
      ht.innerHTML = 'مجموع هزینه‌ها از ابتدای ' + monthLabel() + '<b id="t">' + toPersianDigits(s
        .toLocaleString('en-US')) + '<span class="hdr-tm">تومان</span></b>';
    } else if (filterFrom && filterTo) {
      ht.innerHTML = 'مجموع هزینه‌ها (' + formatDate(filterFrom) + ' تا ' + formatDate(filterTo) +
        ')<b id="t">' + toPersianDigits(s.toLocaleString('en-US')) +
        '<span class="hdr-tm">تومان</span></b>';
    } else if (filterFrom) {
      ht.innerHTML = 'مجموع هزینه‌ها از ' + formatDate(filterFrom) + '<b id="t">' + toPersianDigits(s
        .toLocaleString('en-US')) + '<span class="hdr-tm">تومان</span></b>';
    } else if (filterTo) {
      ht.innerHTML = 'مجموع هزینه‌ها تا ' + formatDate(filterTo) + '<b id="t">' + toPersianDigits(s
        .toLocaleString('en-US')) + '<span class="hdr-tm">تومان</span></b>';
    }
    totalElement = document.getElementById('t');
    updateFilterUI();
    if (!expenses.length) {
      listElement.innerHTML = '<div class="empty"><span>📒</span>هنوز هزینه‌ای ثبت نشده</div>';
      filterBar.style.display = 'none';
      resetSelection();
      return
    }
    if (!fl.length) {
      listElement.innerHTML = '<div class="empty"><span>🔍</span>موردی پیدا نشد</div>';
      filterBar.style.display = 'flex';
      selectedIds = {};
      updateSelectionUI();
      return
    }
    var g = {};
    for (var i = 0; i < fl.length; i++) {
      var k = fl[i].d || todayDateKey();
      if (!g[k]) g[k] = [];
      g[k].push(fl[i])
    }
    var ks = Object.keys(g),
      h = '',
      idx = 0;
    for (var a = 0; a < ks.length; a++) {
      var it = g[ks[a]],
        t = 0;
      for (var x = 0; x < it.length; x++) t += it[x].p;
      h += '<div class="day"><div class="day-hdr" data-dk="' + ks[a] +
        '" title="دابل‌کلیک برای تغییر تاریخ"><span class="d">' + formatDateHeader(ks[a]) +
        '</span><span class="p">' + formatNumber(t) + ' تومان</span></div><div class="day-body">';
      for (var x = 0; x < it.length; x++) {
        var i = it[x],
          id = String(i.idx),
          ch = selectedIds[id] ? ' checked' : '',
          cb = selectionMode ? ' show' : '',
          ni = (idx === 0) ? ' new' : '';
        h += '<div class="item' + ni + '" data-idx="' + idx + '" data-id="' + id +
          '" tabindex="0" role="button"><div class="swbg e">ویرایش</div><div class="swbg d">حذف</div>' +
          '<div class="swfg"><input type="checkbox" class="cb' + cb + '" data-id="' + id +
          '" aria-label="انتخاب ' + escapeAttribute(i.t) + '" ' + ch + '><span class="t">' + escapeHtml(i
          .t) + '</span><span class="pr">' + formatPriceHtml(i.p) +
          '</span><button class="del" aria-label="حذف ' + escapeAttribute(i.t) + '"' + ((selectionMode ||
              TOUCH_DEVICE) ? ' style="display:none"' : '') + ' data-t="' + escapeAttribute(i.t) + '" data-p="' + i
          .p + '" data-d="' + (i.d || '') + '" data-idx="' + i.idx + '">🗑</button></div></div>';
        idx++
      }
      h += '</div></div>'
    }
    listElement.innerHTML = h;
    filterBar.style.display = 'flex';
    updateSelectionUI();
    var rs = listElement.querySelectorAll('.item');
    for (var j = 0; j < rs.length; j++) {
      rs[j].addEventListener('click', function(e) {
        if (!selectionMode || e.target.closest('.del')) return;
        e.preventDefault();
        toggleSelected(this.getAttribute('data-id'))
      });
      rs[j].addEventListener('dblclick', function(e) {
        if (selectionMode || e.target.closest('.del') || e.target.closest('.cb')) return;
        openEditModal(parseInt(this.getAttribute('data-idx')))
      });
      rs[j].addEventListener('keydown', function(e) {
        if (e.target.closest('.cb,.del') || (e.key !== 'Enter' && e.key !== ' ')) return;
        e.preventDefault();
        if (selectionMode) toggleSelected(this.getAttribute('data-id'));
        else openEditModal(parseInt(this.getAttribute('data-idx')))
      });
      if (TOUCH_DEVICE) attachSwipeToItem(rs[j])
    }
    var cs = listElement.querySelectorAll('.cb');
    for (var jj = 0; jj < cs.length; jj++) {
      cs[jj].addEventListener('click', function(e) {
        e.stopPropagation();
        toggleSelected(this.getAttribute('data-id'))
      })
    }
    var ds_ = listElement.querySelectorAll('.del');
    for (var jjj = 0; jjj < ds_.length; jjj++) {

            formatDateHeader(dd) +
            '</div><div style="font-size:12px;color:#999">مطمئنی می‌خوای حذف کنی؟</div>',
            function() {
              rw.classList.remove('hl')
            })

            e.preventDefault();
            lastTap = 0;
            openDayMoveModal(key)
          } else lastTap = now
        })
      })(dh[djj])
    }
  }
  // Swipe right = edit (green), swipe left = delete (red); touch only
  var TOUCH_DEVICE = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

  function attachSwipeToItem(el) {
    var fg = el.querySelector('.swfg'),
      bgE = el.querySelector('.swbg.e'),
      bgD = el.querySelector('.swbg.d');
    var x0 = 0,
      y0 = 0,
      st = 0, // 0=idle 1=deciding 2=horizontal
      dx = 0;

    function clearFx() {
      st = 0;
      dx = 0;
      fg.style.transition = '';
      fg.style.transform = '';
      bgE.style.opacity = 0;
      bgD.style.opacity = 0
    }
    el.addEventListener('touchstart', function(e) {
      if (selectionMode) return;
      var t = e.touches[0];
      x0 = t.clientX;
      y0 = t.clientY;
      st = 1;
      fg.style.transition = 'none'
    }, {
      passive: true
    });
    el.addEventListener('touchmove', function(e) {
      if (!st) return;
      var t = e.touches[0],
        mx = t.clientX - x0,
        my = t.clientY - y0;
      if (st === 1) {
        if (Math.abs(mx) < 9 && Math.abs(my) < 9) return;
        st = Math.abs(mx) > Math.abs(my) * 1.2 ? 2 : 0;
        if (!st) return
      }
      dx = mx;
      var tx = dx > 110 ? 110 : (dx < -110 ? -110 : dx);
      fg.style.transform = 'translateX(' + tx + 'px)';
      bgE.style.opacity = dx > 0 ? Math.min(1, dx / 72) : 0;
      bgD.style.opacity = dx < 0 ? Math.min(1, -dx / 72) : 0;
      e.preventDefault()
    }, {
      passive: false
    });
    el.addEventListener('touchend', function() {
      if (st !== 2) {
        if (st === 1) {
          st = 0;
          fg.style.transition = ''
        }
        return
      }
      var act = dx > 72 ? 'e' : (dx < -72 ? 'd' : '');
      clearFx();
      if (act === 'e') openEditModal(parseInt(el.getAttribute('data-idx')));
      else if (act === 'd') {
        var b = el.querySelector('.del');
        if (b) b.click()
      }
    });
    el.addEventListener('touchcancel', function() {
      if (st) clearFx()
    })
  }

  function normalizeImportedItems(items) {
    if (!Array.isArray(items)) throw new Error('Invalid expenses');
    var result = [];
    for (var i = 0; i < items.length; i++) {
      var item = items[i] || {};
      var title = String(item.t == null ? '' : item.t).trim();
      var price = typeof item.p === 'number' ? Math.round(item.p) : parsePrice(String(item.p || ''));
      var date = normalizeDateKey(item.d);
      if (!title || !Number.isFinite(price) || price <= 0 || !date) {
        throw new Error('Invalid item at row ' + (i + 1))
      }
      result.push({
        t: title,
        p: price,
        d: date,
        idx: Number.isInteger(item.idx) && item.idx >= 0 ? item.idx : undefined
      })
    }
    return result
  }

  function isValidJalaliDate(year, month, day) {
    return year >= 1300 && year <= 1500 && month >= 1 && month <= 12 && day >= 1 &&
      day <= daysInJalaliMonth(year, month)
  }

  function normalizeDateKey(value) {
    var text = String(value || '').trim();
    var western = text.replace(/[۰-۹]/g, function(d) {
      return String('۰۱۲۳۴۵۶۷۸۹'.indexOf(d))
    });
    var match = western.match(/^(13|14|15)\d{2}[-\/]([1-9]|1[0-2])[-\/]([1-9]|[12]\d|3[01])$/);
    var normalized = null;
    if (match) {
      var parts = western.split(/[-\/]/);
      normalized = parseInt(parts[0]) + '-' + parseInt(parts[1]) + '-' + parseInt(parts[2])
    } else {
      normalized = parseDisplayedDate(text)
    }
    if (!normalized) return null;
    var dateParts = normalized.split('-').map(Number);
    return isValidJalaliDate(dateParts[0], dateParts[1], dateParts[2]) ? normalized : null
  }

  function parseCsv(text) {
    var rows = [],
      row = [],
      cell = '',
      quoted = false;
    for (var i = 0; i < text.length; i++) {
      var ch = text[i];
      if (quoted) {
        if (ch === '"' && text[i + 1] === '"') {
          cell += '"';
          i++
        } else if (ch === '"') quoted = false;
        else cell += ch
      } else if (ch === '"') quoted = true;
      else if (ch === ',') {
        row.push(cell);
        cell = ''
      } else if (ch === '\n') {
        row.push(cell);
        rows.push(row);
        row = [];
        cell = ''
      } else if (ch !== '\r') cell += ch
    }
    if (quoted) throw new Error('Unclosed CSV quote');
    if (cell || row.length) {
      row.push(cell);
      rows.push(row)
    }
    return rows
  }

  function importFile(ac, cl) {
    var ip = document.createElement('input');
    ip.type = 'file';
    ip.accept = ac;
    ip.style.display = 'none';
    document.body.appendChild(ip);
    ip.addEventListener('change', function() {
      var f = ip.files[0];
      if (!f) {
        document.body.removeChild(ip);
        return
      }
      var r = new FileReader();
      r.onload = function(e) {
        try {
          var rs = normalizeImportedItems(cl(e.target.result));
          expenses = rs;
          nextExpenseId = 0;
          ensureItemIds();
          saveExpenses();
          resetSelection();
          renderExpenses();
          showToast('✅ ' + toPersianDigits(expenses.length) + ' مورد')
        } catch (er) {
          showToast('❌ فایل معتبر نیست')
        } finally {
          if (ip.parentNode) document.body.removeChild(ip)
        }
      };
      r.onerror = function() {
        showToast('❌ خواندن فایل ناموفق بود');
        if (ip.parentNode) document.body.removeChild(ip)
      };
      r.readAsText(f)
    });
    ip.click()
  }

  function daysInJalaliMonth(jy, jm) {
    if (jm <= 6) return 31;
    if (jm <= 11) return 30;
    var a = (jy + 38) % 2820;
    if (a > 1696) return 29;
    var b = (jy + 39) % 128;
    return b < 33 ? 30 : 29
  }

  function calendarStartOffset(d) {

  }
  var calendarSelectCallback = null;

    calendarSelectCallback = cb || calendarSelectCallback;

    var jsd = new Date(g1.y, g1.m - 1, 1).getDay();
    var off = calendarStartOffset(jsd);
    var W_ = ['ش', 'ی', 'د', 'س', 'چ', 'پ', 'ج'];
    var h_ = '<div class="ch"><button id="cnx">▶</button><span class="my">' + JALALI_MONTHS[calendarMonth -
      1] + ' ' + toPersianDigits(calendarYear) + '</span><button id="cpr">◀</button></div>';
    h_ += '<div class="cdh">';
    for (var i = 0; i < 7; i++) h_ += '<span>' + W_[i] + '</span>';
    h_ += '</div><div class="cd">';
    var td = gregorianToJalali(new Date().getFullYear(), new Date().getMonth() + 1, new Date().getDate());
    for (var r = 0; r < 6; r++) {
      for (var c = 0; c < 7; c++) {
        var dn = r * 7 + c - off + 1;
        if (dn < 1 || dn > mx) h_ += '<button class="ep" aria-hidden="true"></button>';
        else {
          var cs_ = '';
          if (dn === calendarDay) cs_ += ' sl';
          if (dn === td.d && calendarMonth === td.m && calendarYear === td.y) cs_ += ' td';
          h_ += '<button class="' + cs_ + '" data-day="' + dn + '">' + toPersianDigits(dn) + '</button>'
        }
      }

    h_ += '</div><button class="ccls" id="ccl">بستن</button>';

    var dw = (new Date(g.y, g.m - 1, g.d).getDay() + 1) % 7;

  function buildDayShareText(k, items) {
    if (!items.length) return '';
    var p = k.split('-');
    var lines = ['📒 هزینه‌های ' + jalaliWeekdayFull(k) + ' ' + toPersianDigits(parseInt(p[2])) + ' ' +
      JALALI_MONTHS[parseInt(p[1]) - 1] + ' ' + toPersianDigits(parseInt(p[0]))];
    var s = 0;
    for (var i = 0; i < items.length; i++) {
      s += items[i].p;
      lines.push(toPersianDigits(i + 1) + '. ' + items[i].t + ' — ' + formatNumber(items[i].p) + ' تومان')
    }
    lines.push('──────────');
    lines.push('🧮 جمع: ' + formatNumber(s) + ' تومان (' + toPersianDigits(items.length) + ' مورد)');
    return lines.join('\n')
  }

  function buildSelectionShareText(items) {
    var g = {},
      order = [];
    for (var i = 0; i < items.length; i++) {
      var k = items[i].d || todayDateKey();
      if (!g[k]) {
        g[k] = [];
        order.push(k)
      }
      g[k].push(items[i])
    }
    order.sort(function(a, b) {
      return dateKeyNumber(a) - dateKeyNumber(b)
    });
    for (var j = 0; j < order.length; j++) {
      g[order[j]].sort(function(a, b) {
        return a.idx - b.idx
      })
    }
    if (order.length === 1) return buildDayShareText(order[0], g[order[0]]);
    var total = 0,
      count = 0,
      lines = ['📒 هزینه‌های منتخب'];
    for (var a = 0; a < order.length; a++) {
      var k = order[a],
        it = g[k],
        p = k.split('-'),
        s = 0;
      lines.push('');
      lines.push('🗓 ' + jalaliWeekdayFull(k) + ' ' + toPersianDigits(parseInt(p[2])) + ' ' +
        JALALI_MONTHS[parseInt(p[1]) - 1] + ' ' + toPersianDigits(parseInt(p[0])));
      for (var x = 0; x < it.length; x++) {
        s += it[x].p;
        lines.push(toPersianDigits(x + 1) + '. ' + it[x].t + ' — ' + formatNumber(it[x].p) + ' تومان')
      }
      total += s;
      count += it.length;
      lines.push('جمع روز: ' + formatNumber(s) + ' تومان (' + toPersianDigits(it.length) + ' مورد)')
    }
    lines.push('');
    lines.push('──────────');
    lines.push('🧮 جمع کل: ' + formatNumber(total) + ' تومان (' + toPersianDigits(count) + ' مورد)');
    return lines.join('\n')
  }

  function closeShareModal() {
    shareModal.classList.remove('show')
  }
  function openSelSharePreview() {
    var items = [];
    for (var i = 0; i < expenses.length; i++) {
      if (selectedIds[String(expenses[i].idx)]) items.push(expenses[i])
    }
    if (!items.length) {
      showToast('موردی انتخاب نشده');
      return
    }
    shareTextCache = buildSelectionShareText(items);
    sharePreview.textContent = shareTextCache;
    shareNativeButton.style.display = (typeof navigator.share === 'function') ? '' : 'none';
    shareModal.classList.add('show')
  }
  selShareButton.addEventListener('click', openSelSharePreview);

  // Move selected expenses to another date
  function moveSelectedTo(k) {
    var n = 0;
    for (var i = 0; i < expenses.length; i++) {
      if (selectedIds[String(expenses[i].idx)]) {
        expenses[i].d = k;
        n++
      }
    }
    if (!n) return;
    saveExpenses();
    resetSelection();
    renderExpenses();
    showToast('✅ ' + toPersianDigits(n) + ' مورد منتقل شد')
  }
  selMoveButton.addEventListener('click', function() {
    var p = todayDateKey().split('-');
    calendarYear = parseInt(p[0]);
    calendarMonth = parseInt(p[1]);
    calendarDay = parseInt(p[2]);
    renderCalendar(function(k) {
      moveSelectedTo(k)
    });
    calendarModal.classList.add('show')
  });
  shareNativeButton.addEventListener('click', function() {
    if (!shareTextCache) return;
    try {
      if (typeof navigator.share === 'function') {
        navigator.share({
          title: 'دفترچه هزینه',
          text: shareTextCache
        }).catch(function() {})
      } else shareCopyButton.click()
    } catch (e) {
      shareCopyButton.click()
    }
  })
  shareCopyButton.addEventListener('click', function() {
    if (!shareTextCache) return;

    function done() {
      showToast('📋 کپی شد')
    }

    function legacy() {
      try {
        var ta = document.createElement('textarea');
        ta.value = shareTextCache;
        ta.style.cssText = 'position:fixed;opacity:0;top:0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        done()
      } catch (er) {
        showToast('❌ کپی نشد')
      }
    }
    if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
      navigator.clipboard.writeText(shareTextCache).then(done, legacy)
    } else legacy()
  })
  shareCloseButton.addEventListener('click', closeShareModal);
  shareModal.addEventListener('click', function(e) {
    if (e.target === shareModal) closeShareModal()
  })

  function escapeHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML
  }

  function escapeAttribute(s) {
    return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
  }

  function addExpense() {
    var t = titleInput.value.trim();
    var p = parsePrice(priceInput.value.trim());
    if (!t) {
      titleInput.focus();
      return
    }
    if (!p || p <= 0) {
      priceInput.focus();
      return
    }
    expenses.push({
      t: t,
      p: p,
      d: todayDateKey(),
      idx: nextExpenseId++
    });
    saveExpenses();
    renderExpenses();
    titleInput.value = '';
    priceInput.value = '';
    titleInput.focus();
    setTimeout(function() {
      listElement.scrollTop = listElement.scrollHeight
    }, 200)
  }
  addButton.addEventListener('click', addExpense)
  priceInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      addExpense()
    }
  })
  titleInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      priceInput.focus()
    }
  })
  priceInput.addEventListener('input', function() {
    var f = formatPriceInput(priceInput.value);
    if (f && f !== priceInput.value) {
      priceInput.value = f;
      priceInput.setSelectionRange(f.length, f.length)
    }
  })
  editPriceInput.addEventListener('input', function() {
    var f = formatPriceInput(editPriceInput.value);
    if (f && f !== editPriceInput.value) {
      editPriceInput.value = f;
      editPriceInput.setSelectionRange(f.length, f.length)
    }
  })
  document.addEventListener('keydown', function(e) {
    if (e.key !== 'Escape') return;
    if (confirmModal.classList.contains('show')) {
      confirmModal.classList.remove('show');
      if (confirmCancelCallback) confirmCancelCallback();
      confirmCancelCallback = null;
      pendingConfirmCallback = null
    } else if (calendarModal.classList.contains('show')) {
      calendarModal.classList.remove('show')
    } else if (shareModal.classList.contains('show')) {
      closeShareModal()
    } else if (dayMoveModal.classList.contains('show')) {
      closeDayMoveModal()
    } else if (editModal.classList.contains('show')) {
      closeEditModal()
    } else if (filterModal.classList.contains('show')) {
      filterModal.classList.remove('show')
    } else if (backupModal.classList.contains('show')) {
      backupModal.classList.remove('show')
    }
  });

  loadExpenses();
  renderExpenses();
  titleInput.addEventListener('focus', function() {
    setTimeout(function() {
      listElement.scrollTop = listElement.scrollHeight
    }, 150)
  });
  priceInput.addEventListener('focus', function() {
    setTimeout(function() {
      listElement.scrollTop = listElement.scrollHeight
    }, 150)
  });
  titleInput.focus();
})();
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sabtehazineha/sw.js")}</script>
